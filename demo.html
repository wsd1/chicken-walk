<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>Peep SVG动画 - OBS透明背景版</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: transparent !important;
            overflow: hidden;
            font-family: Arial, sans-serif;
        }
        
        #container {
            width: 1920px;
            height: 1080px;
            position: relative;
            background: transparent;
            overflow: hidden;
        }
        
        #peep-svg {
            position: absolute;
            width: 50px;
            height: 100px;
            transform-origin: center bottom;
            will-change: transform;
            filter: drop-shadow(0 10px 5px rgba(0, 0, 0, 0.3));
            pointer-events: none;
        }
        
        .instructions {
            position: absolute;
            bottom: 10px;
            left: 0;
            right: 0;
            text-align: center;
            color: rgba(255, 255, 255, 0.7);
            font-size: 12px;
            background: rgba(0, 0, 0, 0.3);
            padding: 5px;
            border-radius: 3px;
            margin: 0 10px;
        }
        
        .controls {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(0, 0, 0, 0.5);
            color: white;
            padding: 8px;
            border-radius: 5px;
            font-size: 11px;
            max-width: 150px;
        }
    </style>
</head>
<body>
    <div id="container">
        <img id="peep-svg" src="chick.svg" alt="Peep">
        <div class="instructions">使用 ↑ ↓ ← → 方向键移动 Peep</div>
    </div>

    <script src="https://code.createjs.com/1.0.0/createjs.min.js"></script>
    <script>
        // Peep SVG动画 - 透明背景版
        // 专为OBS直播动画层设计
        
        Math.TAU = Math.PI * 2;

        // ===== 资源管理 =====
        var assetsCallback;
        var assetsLeft = 0;
        var images = {};

        function addAsset(name, src) {
            assetsLeft++;
            images[name] = new Image();
            images[name].onload = function() {
                assetsLeft--;
                if (assetsLeft === 0 && assetsCallback) assetsCallback();
            };
            images[name].src = src;
        }

        function addSound(name, src) {
            assetsLeft++;
            createjs.Sound.addEventListener("fileload", function() {
                assetsLeft--;
                if (assetsLeft === 0 && assetsCallback) assetsCallback();
            });
            createjs.Sound.registerSound({ src: src, id: name });
        }

        // ===== 简化的 Peep 类（SVG版本） =====
        function PeepSVG(config, container) {
            var self = this;
            var peepElement = document.getElementById('peep-svg');
            
            // 位置与速度
            self.x = config.x;
            self.y = config.y;
            self.vel = { x: 0, y: 0 };

            // 动画状态
            self.frame = 0;      // 行走帧 (0=站立, 1-9=行走)
            self.direction = 1;  // 1=右, -1=左
            self.clucking = 0;

            // 弹簧物理系统变量
            self.sway = 0;       // 摇晃角度（弧度）
            self.bounce = 1;     // 弹跳缩放因子

            // 内部物理变量
            var swayVel = 0;     // 摇晃角速度
            var bounceVel = 0;   // 弹跳变化速度

            // 行走时的垂直位移数组（脚步动画）
            var bouncy = [0.00, 0.25, 1.00, 0.90, 0.00, 0.00, 0.25, 1.00, 0.90, 0.00];

            // 容器尺寸
            var containerWidth = container.clientWidth;
            var containerHeight = container.clientHeight;

            // ===== 键盘状态 =====
            var Key = {};
            window.addEventListener('keydown', function(e) {
                if (e.key === 'ArrowLeft') Key.left = true;
                if (e.key === 'ArrowRight') Key.right = true;
                if (e.key === 'ArrowUp') Key.up = true;
                if (e.key === 'ArrowDown') Key.down = true;
                e.preventDefault();
            });
            window.addEventListener('keyup', function(e) {
                if (e.key === 'ArrowLeft') Key.left = false;
                if (e.key === 'ArrowRight') Key.right = false;
                if (e.key === 'ArrowUp') Key.up = false;
                if (e.key === 'ArrowDown') Key.down = false;
            });

            // ===== 更新函数 =====
            self.update = function() {
                // ----- 键盘输入 -----
                var dx = 0, dy = 0;
                if (Key.left) dx -= 1;
                if (Key.right) dx += 1;
                if (Key.up) dy -= 1;
                if (Key.down) dy += 1;

                // 归一化方向，使斜向移动速度一致
                var dd = Math.sqrt(dx * dx + dy * dy);
                if (dd > 0) {
                    self.vel.x += (dx / dd) * 2;
                    self.vel.y += (dy / dd) * 2;
                }

                // 设置朝向
                if (Key.left) self.direction = -1;
                if (Key.right) self.direction = 1;

                // ----- 行走动画 -----
                if (Key.left || Key.right || Key.up || Key.down) {
                    self.frame++;
                    if (self.frame > 9) self.frame = 1;
                } else {
                    if (self.frame > 0) self.bounce = 0.8;  // 停止时的落地弹跳
                    self.frame = 0;
                }

                // ----- 物理移动 -----
                self.x += self.vel.x;
                self.y += self.vel.y;

                // 摩擦力衰减
                self.vel.x *= 0.7;
                self.vel.y *= 0.7;

                // ----- 容器边界限制 -----
                if (self.x < 25) self.x = 25;
                if (self.x > containerWidth - 50) self.x = containerWidth - 50;
                if (self.y < 5) self.y = 5;
                if (self.y > containerHeight - 250) self.y = containerHeight - 250;

                // ----- 弹簧物理系统：摇晃 -----
                swayVel += ((-self.vel.x * 0.08) - self.sway) * 0.2;
                swayVel *= 0.9;  // 阻尼衰减
                self.sway += swayVel;

                // ----- 弹簧物理系统：弹跳 -----
                bounceVel += (1 - self.bounce) * 0.2;  // 回复到1
                bounceVel *= 0.9;
                self.bounce += bounceVel;

                // ----- 更新SVG变换 -----
                self.updateTransform();
            };

            // ===== 更新SVG变换 =====
            self.updateTransform = function() {
                var x = self.x;
                var y = self.y;
                
                // 脚部动画产生的垂直位移
                var verticalOffset = -6 * bouncy[self.frame];
                y += verticalOffset;

                // 脚步声
                if (self.frame === 4 || self.frame === 9) { 
                    if (self.clucking++ > 3) { 
                        self.clucking = 0;
                        createjs.Sound.play("step", { volume: 0.5 });
                    }
                }

                // 构建CSS transform字符串
                // 注意：SVG的变换顺序与Canvas不同，需要调整
                var transform = '';
                
                // 1. 位置移动（像素单位）
                transform += `translate(${x}px, ${y}px) `;
                
                // 2. 整体缩放（0.5倍）
                transform += `scale(0.8) `;
                
                // 3. 摇晃旋转（弧度转角度）
                var swayDegrees = self.sway * (180 / Math.PI);
                transform += `rotate(${swayDegrees}deg) `;
                
                // 4. 方向翻转
                transform += `scaleX(${self.direction}) `;
                
                // 5. 弹跳挤压效果
                var scaleX = 1 / self.bounce;
                var scaleY = self.bounce;
                transform += `scale(${scaleX}, ${scaleY})`;

                // 应用到SVG元素
                peepElement.style.transform = transform;
                
                // 更新阴影效果
                var shadowScale = (3 - bouncy[self.frame]) / 3;
                peepElement.style.filter = `drop-shadow(0 ${10 * shadowScale}px ${5 * shadowScale}px rgba(0, 0, 0, 0.3))`;
            };
        }

        // ===== 游戏初始化 =====
        window.onload = function() {
            var container = document.getElementById('container');
            
            // 加载资源
            addAsset("peep", "chick.svg");
            addSound("step", "hen.wav");

            // 资源加载完成回调
            var onLoadAssets = function(callback) {
                assetsCallback = callback;
                if (assetsLeft === 0) assetsCallback();
            };

            onLoadAssets(function() {
                // 创建Peep实例
                var peep = new PeepSVG({ 
                    x: container.clientWidth / 2, 
                    y: container.clientHeight / 2 
                }, container);

                // 游戏循环
                function gameLoop() {
                    peep.update();
                    requestAnimationFrame(gameLoop);
                }

                // 启动游戏循环
                gameLoop();
                
                // 窗口大小变化时重新调整
                window.addEventListener('resize', function() {
                    // 可以在这里添加重新调整位置的逻辑
                });
                
                console.log('Peep SVG动画已启动！透明背景，适合OBS使用。');
            });
        };
    </script>
</body>
</html>
